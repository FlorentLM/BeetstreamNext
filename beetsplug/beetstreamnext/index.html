<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeetstreamNext</title>
    <link rel="icon" type="image/svg+xml" href="images/beetstreamnext_logo.svg"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #954039;
            --bg: #180100;
            --card-bg: #260201;
            --text: #f8fafc;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
        }
        .logo-container {
            margin-bottom: 2rem;
        }
        .logo-container img {
            width: 120px;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(243, 112, 33, 0.3));
        }
        h1 {
            font-weight: 800;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }
        p.subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            padding: 0.5rem 1rem;
            border-radius: 99px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 2rem;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }
        .stat-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-value {
            display: block;
            font-size: 1.5rem;
            font-weight: 700;
        }
        .stat-label {
            color: #94a3b8;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .footer-links {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 2rem;
        }
        .github-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
            padding: 0.6rem 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }
        .github-link:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
            border-color: var(--primary);
            opacity: 1;
        }
        .github-link svg {
            fill: currentColor;
            width: 20px;
            height: 20px;
        }
        a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        a:hover { opacity: 0.8; }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(74, 222, 128, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <div style="width: 120px; margin: 0 auto; filter: drop-shadow(0 0 20px rgba(243, 112, 33, 0.3));">
                {{ logo_svg | safe }}
            </div>
        </div>

        <div class="status-badge">
            <span class="status-dot"></span>
            Server {{ stats.status }}
        </div>

        <h1>BeetstreamNext</h1>
        <p class="subtitle">Your Beets library, streaming anywhere.</p>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-value">{{ stats.songs }}</span>
                <span class="stat-label">Tracks</span>
            </div>
            <div class="stat-card">
                <span class="stat-value">{{ stats.albums }}</span>
                <span class="stat-label">Albums</span>
            </div>
        </div>

        <div class="footer-links">
            <p>Connect your favourite client using this URL</p>
            <code style="background: #000; padding: 5px 10px; border-radius: 4px; display: inline-block; margin-bottom: 1rem;">
                {{ request.host_url }}
            </code>

            <br>
            <a href="https://github.com/FlorentLM/beetstreamnext" target="_blank" class="github-link">
                <svg viewBox="0 0 16 16" aria-hidden="true">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
                </svg>
                View on GitHub
            </a>
        </div>
    </div>
</body>
</html>
