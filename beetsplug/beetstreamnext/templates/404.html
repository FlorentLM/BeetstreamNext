{% extends "base.html" %}

{% block title %} - Page Not Found{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/404.css') }}">
{% endblock %}

{% block body %}
<div class="error-container">
    <div class="logo-container">
        <a href="/">
            <img src="{{ url_for('static', filename='images/logo.svg') }}" alt="BeetstreamNext" class="logo-medium">
        </a>
    </div>

    <h1 class="error-code">404</h1>
    <h2 class="error-title">*record scratches*</h2>
    <p class="error-message">Looks like you're lost.</p>

    <a href="/" class="btn btn-primary btn-home">
        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back to Home
    </a>
</div>
{% endblock %}
